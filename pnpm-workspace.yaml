# =============================================================================
# pnpm-Workspace-Config
# -----------------------------------------------------------------------------
# Trotz fehlender Workspace-Packages nutzt pnpm 10+ diese Datei für die globale
# Konfiguration (Build-Trust und Overrides).
# =============================================================================

# Postinstall-Scripts: Welche Pakete dürfen ihre Build-Scripts ausführen?
# (pnpm 10+ blockiert sie standardmäßig — Security-Feature)
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true

# Transitive Dependency-Overrides
# -----------------------------------------------------------------------------
# Zwingt bestimmte Versionen für transitive Pakete, unabhängig davon, was
# Parent-Pakete (z.B. vitest, tsx) nominell verlangen. Wird genutzt um
# Security-Patches durchzusetzen, ohne auf einen Parent-Bump warten zu müssen.
overrides:
  # CVE: Path Traversal in Optimized Deps .map Handling
  # Mit vitest 4 läuft sowieso vite >= 6, der Override ist nur Safety-Net
  # gegen versehentliche Downgrades durch andere Pakete.
  vite: '>=5.4.20'

  # CVE: XSS via Unescaped </style> in CSS Stringify Output
  # postcss < 8.5.0 ist betroffen.
  postcss: '>=8.5.0'

  # GHSA-g7r4-m6w7-qqqr: esbuild Dev-Server erlaubt unter Windows arbitrary
  # file read (betroffen: >= 0.27.3, < 0.28.1). vite 8 verlangt esbuild ^0.28.0,
  # daher greift der Override jetzt (anders als früher unter vite 5/esbuild ^0.21).
  esbuild: '>=0.28.1'
